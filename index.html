<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ---------- Almacenamiento local (reemplaza window.storage de Claude) ----------
window.storage = {
  get: async (key) => {
    const v = localStorage.getItem(key);
    return v == null ? null : { key, value: v };
  },
  set: async (key, value) => {
    localStorage.setItem(key, value);
    return { key, value };
  },
  delete: async (key) => {
    localStorage.removeItem(key);
    return { key, deleted: true };
  },
  list: async (prefix) => {
    const keys = Object.keys(localStorage).filter((k) => !prefix || k.startsWith(prefix));
    return { keys };
  },
};

// ---------- Íconos propios (sin dependencias externas) ----------
function Icon({ children, size = 18, style, className, viewBox = "0 0 24 24", ...rest }) {
  return (
    <svg width={size} height={size} viewBox={viewBox} fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}
      className={className} {...rest}>
      {children}
    </svg>
  );
}
const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
const ChevronLeft = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6"/></Icon>;
const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;
const Calendar = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Icon>;
const Receipt = (p) => <Icon {...p}><path d="M6 2h12v18l-2-1-2 1-2-1-2 1-2-1-2 1V2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></Icon>;
const Settings = (p) => <Icon {...p}><line x1="4" y1="6" x2="20" y2="6"/><circle cx="9" cy="6" r="2"/><line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="9" cy="18" r="2"/></Icon>;
const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></Icon>;
const User = (p) => <Icon {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></Icon>;
const Check = (p) => <Icon {...p}><polyline points="5 13 10 18 19 7"/></Icon>;
const X = (p) => <Icon {...p}><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></Icon>;
const Stethoscope = (p) => <Icon {...p}><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></Icon>;
const Upload = (p) => <Icon {...p}><path d="M12 16V4"/><polyline points="7 9 12 4 17 9"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></Icon>;
const FileSpreadsheet = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></Icon>;
const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;


// ---------- Tokens ----------
// Color: petrol/teal primary (clinical trust), mustard-gold highlight for money,
// cool paper background (not cream), deep ink text.
const C = {
  bg: "#EEF2F0",
  paper: "#FFFFFF",
  ink: "#152420",
  inkSoft: "#5B6D67",
  border: "#DDE5E1",
  primary: "#0B5D52",
  primaryDeep: "#083D37",
  primarySoft: "#E3F0EC",
  gold: "#C98A2B",
  goldSoft: "#FBF0DC",
  danger: "#B5482F",
};

const fmtCLP = (n) =>
  new Intl.NumberFormat("es-CL", { style: "currency", currency: "CLP", maximumFractionDigits: 0 }).format(
    Math.round(n || 0)
  );

const todayISO = () => new Date().toISOString().slice(0, 10);
const monthKey = (iso) => iso.slice(0, 7);
const MONTH_NAMES = [
  "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
  "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre",
];
const monthLabel = (key) => {
  const [y, m] = key.split("-").map(Number);
  return `${MONTH_NAMES[m - 1]} ${y}`;
};
const shiftMonth = (key, delta) => {
  const [y, m] = key.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
};
const shortDate = (iso) => {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("es-CL", { day: "2-digit", month: "short" });
};

const DEFAULT_SETTINGS = { pctEmpresa: 0.4, pctRetencion: 0.1525, year: new Date().getFullYear() };

// ---------- Import helpers ----------
const normalize = (s) =>
  (s || "").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();

function findHeaderMap(rows) {
  for (let i = 0; i < Math.min(rows.length, 8); i++) {
    const row = rows[i].map(normalize);
    const idx = {
      ficha: row.findIndex((c) => c.includes("ficha")),
      paciente: row.findIndex((c) => c.includes("pacient")),
      estado: row.findIndex((c) => c.includes("estado")),
      fecha: row.findIndex((c) => c.includes("fecha")),
      monto: row.findIndex((c) => c.includes("monto") || c.includes("accion") || c.includes("valor")),
    };
    const found = Object.values(idx).filter((v) => v !== -1).length;
    if (found >= 3) return { headerRow: i, idx };
  }
  return null;
}

function parseFechaCell(value) {
  if (value == null || value === "") return null;
  if (value instanceof Date && !isNaN(value)) return value.toISOString().slice(0, 10);
  if (typeof value === "number") {
    const ms = Math.round((value - 25569) * 86400 * 1000);
    const d = new Date(ms);
    if (!isNaN(d)) return d.toISOString().slice(0, 10);
    return null;
  }
  const str = value.toString().trim();
  let m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) return `${m[1]}-${m[2].padStart(2, "0")}-${m[3].padStart(2, "0")}`;
  m = str.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})$/);
  if (m) {
    let [, d, mo, y] = m;
    if (y.length === 2) y = (Number(y) > 50 ? "19" : "20") + y;
    return `${y}-${mo.padStart(2, "0")}-${d.padStart(2, "0")}`;
  }
  return null;
}

function parseMontoCell(value) {
  if (value == null || value === "") return 0;
  if (typeof value === "number") return value;
  const cleaned = value.toString().replace(/[^\d.-]/g, "").replace(/\.(?=\d{3}(\D|$))/g, "");
  const n = parseFloat(cleaned);
  return isNaN(n) ? 0 : n;
}

function parseEstadoCell(value) {
  const v = normalize(value);
  return v.startsWith("a") ? "A" : "I";
}

function parseWorkbook(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: "array", cellDates: true });
  let best = [];
  for (const sheetName of wb.SheetNames) {
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "", raw: true });
    const map = findHeaderMap(rows);
    if (!map) continue;
    const { headerRow, idx } = map;
    const out = [];
    for (let r = headerRow + 1; r < rows.length; r++) {
      const row = rows[r];
      if (!row || row.every((c) => c === "" || c == null)) continue;
      const ficha = idx.ficha !== -1 ? (row[idx.ficha] ?? "").toString().trim() : "";
      const paciente = idx.paciente !== -1 ? (row[idx.paciente] ?? "").toString().trim() : "";
      const monto = idx.monto !== -1 ? parseMontoCell(row[idx.monto]) : 0;
      const fecha = idx.fecha !== -1 ? parseFechaCell(row[idx.fecha]) : null;
      const estado = idx.estado !== -1 ? parseEstadoCell(row[idx.estado]) : "I";
      if (!paciente || !monto || monto <= 0) continue;
      out.push({
        ficha: ficha || "s/n",
        paciente,
        estado,
        fecha: fecha || todayISO(),
        monto,
      });
    }
    if (out.length > best.length) best = out;
  }
  return best;
}

function App() {
  const [loading, setLoading] = useState(true);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [entries, setEntries] = useState([]);
  const [officialPayments, setOfficialPayments] = useState({});
  const [tab, setTab] = useState("registrar");
  const [month, setMonth] = useState(monthKey(todayISO()));
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const s = await window.storage.get("settings");
        if (s?.value) setSettings({ ...DEFAULT_SETTINGS, ...JSON.parse(s.value) });
      } catch (e) { /* no settings yet */ }
      try {
        const e = await window.storage.get("entries");
        if (e?.value) setEntries(JSON.parse(e.value));
      } catch (e) { /* no entries yet */ }
      try {
        const o = await window.storage.get("officialPayments");
        if (o?.value) setOfficialPayments(JSON.parse(o.value));
      } catch (e) { /* none yet */ }
      setLoading(false);
    })();
  }, []);

  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 1800);
  };

  const persistEntries = async (next) => {
    setEntries(next);
    try {
      await window.storage.set("entries", JSON.stringify(next));
    } catch (e) {
      showToast("No se pudo guardar. Intenta de nuevo.");
    }
  };

  const persistSettings = async (next) => {
    setSettings(next);
    try {
      await window.storage.set("settings", JSON.stringify(next));
    } catch (e) {
      showToast("No se pudo guardar la configuración.");
    }
  };

  const setOfficialForMonth = async (monthKeyVal, amount) => {
    const next = { ...officialPayments, [monthKeyVal]: amount };
    setOfficialPayments(next);
    try {
      await window.storage.set("officialPayments", JSON.stringify(next));
      showToast("Pago oficial guardado");
    } catch (e) {
      showToast("No se pudo guardar el pago oficial.");
    }
  };

  const addEntry = (entry) => {
    const next = [{ ...entry, id: `${Date.now()}-${Math.random().toString(36).slice(2, 7)}` }, ...entries];
    persistEntries(next);
    showToast("Acción registrada");
  };

  const importEntries = (parsed) => {
    const withIds = parsed.map((e, i) => ({
      ...e,
      id: `${Date.now()}-${i}-${Math.random().toString(36).slice(2, 7)}`,
    }));
    const next = [...withIds, ...entries];
    persistEntries(next);
    showToast(`${withIds.length} acciones importadas`);
  };

  const deleteEntry = (id) => {
    persistEntries(entries.filter((e) => e.id !== id));
  };

  const patientsSuggestions = useMemo(() => {
    const map = new Map();
    entries.forEach((e) => {
      if (!map.has(e.ficha)) map.set(e.ficha, e.paciente);
    });
    return Array.from(map, ([ficha, paciente]) => ({ ficha, paciente }));
  }, [entries]);

  const monthEntries = useMemo(
    () => entries.filter((e) => monthKey(e.fecha) === month).sort((a, b) => (a.fecha < b.fecha ? 1 : -1)),
    [entries, month]
  );

  const calc = (monto) => {
    const bruto = monto * settings.pctEmpresa;
    const retencion = bruto * settings.pctRetencion;
    return { bruto, retencion, liquido: bruto - retencion };
  };

  const monthTotals = useMemo(() => {
    return monthEntries.reduce(
      (acc, e) => {
        const { bruto, retencion, liquido } = calc(e.monto);
        acc.monto += e.monto;
        acc.bruto += bruto;
        acc.retencion += retencion;
        acc.liquido += liquido;
        acc.count += 1;
        return acc;
      },
      { monto: 0, bruto: 0, retencion: 0, liquido: 0, count: 0 }
    );
  }, [monthEntries, settings]);

  const byPatient = useMemo(() => {
    const map = new Map();
    monthEntries.forEach((e) => {
      const key = e.ficha;
      if (!map.has(key)) map.set(key, { ficha: e.ficha, paciente: e.paciente, monto: 0, ultima: e.fecha, estados: new Set(), items: [] });
      const row = map.get(key);
      row.monto += e.monto;
      row.estados.add(e.estado);
      row.items.push(e);
      if (e.fecha > row.ultima) row.ultima = e.fecha;
    });
    return Array.from(map.values()).sort((a, b) => (a.ultima < b.ultima ? 1 : -1));
  }, [monthEntries]);

  if (loading) {
    return (
      <div style={{ background: C.bg }} className="min-h-[600px] flex items-center justify-center">
        <div style={{ color: C.inkSoft }} className="text-sm">Cargando…</div>
      </div>
    );
  }

  return (
    <div style={{ background: C.bg }} className="min-h-[700px] flex items-center justify-center p-4 font-sans">
      <div
        style={{ background: C.paper, boxShadow: "0 30px 60px -20px rgba(8,61,55,0.35)" }}
        className="w-full max-w-[420px] rounded-[2.2rem] overflow-hidden relative border border-black/5"
      >
        {/* Status bar notch feel */}
        <div style={{ background: C.primaryDeep }} className="h-7 flex items-center justify-center relative">
          <div className="w-24 h-4 bg-black/25 rounded-full absolute top-1.5" />
        </div>

        {/* Header */}
        <div style={{ background: C.primaryDeep }} className="px-5 pb-5 pt-2 text-white">
          <div className="flex items-center gap-2">
            <div style={{ background: "rgba(255,255,255,0.12)" }} className="w-9 h-9 rounded-xl flex items-center justify-center">
              <Stethoscope size={18} />
            </div>
            <div>
              <div className="text-[11px] tracking-wide uppercase opacity-70">Control de Honorarios</div>
              <div className="text-lg font-semibold leading-tight" style={{ fontFamily: "Georgia, serif" }}>Pagos Mensuales</div>
            </div>
          </div>
        </div>

        {/* Body */}
        <div className="px-4 pt-4 pb-24 min-h-[520px]" style={{ background: C.bg }}>
          {tab === "registrar" && (
            <RegistrarTab
              onAdd={addEntry}
              suggestions={patientsSuggestions}
              recent={entries.slice(0, 6)}
              onDelete={deleteEntry}
              calc={calc}
            />
          )}
          {tab === "mes" && (
            <MesTab
              month={month}
              setMonth={setMonth}
              byPatient={byPatient}
              totals={monthTotals}
            />
          )}
          {tab === "boleta" && (
            <BoletaTab
              month={month}
              setMonth={setMonth}
              totals={monthTotals}
              settings={settings}
              official={officialPayments[month]}
              onSaveOfficial={(amount) => setOfficialForMonth(month, amount)}
            />
          )}
          {tab === "ajustes" && (
            <AjustesTab
              settings={settings}
              onSave={persistSettings}
              onImport={importEntries}
              entries={entries}
              officialPayments={officialPayments}
            />
          )}
        </div>

        {/* Toast */}
        {toast && (
          <div
            style={{ background: C.ink, color: "#fff" }}
            className="absolute left-1/2 -translate-x-1/2 bottom-24 px-4 py-2 rounded-full text-xs shadow-lg flex items-center gap-1.5 animate-[fadeIn_0.15s_ease-out]"
          >
            <Check size={13} /> {toast}
          </div>
        )}

        {/* Bottom tab bar */}
        <div
          style={{ background: C.paper, borderTop: `1px solid ${C.border}` }}
          className="absolute bottom-0 left-0 right-0 px-3 py-2.5 flex justify-between"
        >
          <TabBtn active={tab === "registrar"} onClick={() => setTab("registrar")} icon={<Plus size={20} />} label="Registrar" />
          <TabBtn active={tab === "mes"} onClick={() => setTab("mes")} icon={<Calendar size={20} />} label="Mes" />
          <TabBtn active={tab === "boleta"} onClick={() => setTab("boleta")} icon={<Receipt size={20} />} label="Control" />
          <TabBtn active={tab === "ajustes"} onClick={() => setTab("ajustes")} icon={<Settings size={20} />} label="Ajustes" />
        </div>
      </div>
    </div>
  );
}

function TabBtn({ active, onClick, icon, label }) {
  return (
    <button
      onClick={onClick}
      className="flex flex-col items-center gap-0.5 flex-1 py-1 rounded-xl transition-transform active:scale-90"
      style={{ color: active ? C.primary : C.inkSoft }}
    >
      {icon}
      <span className="text-[10px] font-medium">{label}</span>
      <div
        style={{ background: active ? C.primary : "transparent" }}
        className="w-1 h-1 rounded-full mt-0.5"
      />
    </button>
  );
}

function Section({ title, subtitle, children }) {
  return (
    <div className="mb-4">
      {title && <div style={{ color: C.ink }} className="text-[15px] font-semibold mb-0.5">{title}</div>}
      {subtitle && <div style={{ color: C.inkSoft }} className="text-xs mb-2">{subtitle}</div>}
      {children}
    </div>
  );
}

// ---------- Registrar Tab ----------
function RegistrarTab({ onAdd, suggestions, recent, onDelete, calc }) {
  const [paciente, setPaciente] = useState("");
  const [ficha, setFicha] = useState("");
  const [estado, setEstado] = useState("I");
  const [fecha, setFecha] = useState(todayISO());
  const [monto, setMonto] = useState("");
  const [showSug, setShowSug] = useState(false);

  const filtered = suggestions.filter(
    (s) => paciente && s.paciente.toLowerCase().includes(paciente.toLowerCase())
  ).slice(0, 4);

  const canSave = paciente.trim() && ficha.trim() && fecha && Number(monto) > 0;

  const submit = () => {
    if (!canSave) return;
    onAdd({ paciente: paciente.trim(), ficha: ficha.trim(), estado, fecha, monto: Number(monto) });
    setPaciente(""); setFicha(""); setMonto(""); setEstado("I"); setFecha(todayISO());
  };

  return (
    <div>
      <Section title="Nueva acción" subtitle="Registra el pago de una prestación">
        <div style={{ background: C.paper, borderColor: C.border }} className="rounded-2xl border p-3.5 space-y-3">
          <div className="relative">
            <label style={{ color: C.inkSoft }} className="text-[11px] font-medium block mb-1">Paciente</label>
            <input
              value={paciente}
              onChange={(e) => { setPaciente(e.target.value); setShowSug(true); }}
              onFocus={() => setShowSug(true)}
              placeholder="Nombre del paciente"
              style={{ borderColor: C.border, color: C.ink }}
              className="w-full border rounded-xl px-3 py-2 text-sm outline-none focus:ring-2"
              onBlur={() => setTimeout(() => setShowSug(false), 120)}
            />
            {showSug && filtered.length > 0 && (
              <div style={{ borderColor: C.border }} className="absolute z-10 left-0 right-0 mt-1 bg-white border rounded-xl shadow-lg overflow-hidden">
                {filtered.map((s) => (
                  <button
                    key={s.ficha}
                    onClick={() => { setPaciente(s.paciente); setFicha(s.ficha); setShowSug(false); }}

    return byPatient.filter(
      (p) => normalize(p.paciente).includes(q) || normalize(p.ficha).includes(q)

  return (
    <div>
      <MonthSwitcher month={month} setMonth={setMonth} />

// ---------- Ajustes Tab ----------
function exportBackup(entries, officialPayments) {
  const wsData = [
    ["Ficha", "Paciente", "Estado", "Fecha", "Monto"],
    ...entries
      .slice()
      .sort((a, b) => (a.fecha < b.fecha ? 1 : -1))
      .map((e) => [e.ficha, e.paciente, e.estado, e.fecha, e.monto]),
  ];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws["!cols"] = [{ wch: 14 }, { wch: 20 }, { wch: 8 }, { wch: 12 }, { wch: 12 }];

  const wsData2 = [
    ["Mes", "Pago Oficial Recibido"],
    ...Object.entries(officialPayments).sort(([a], [b]) => (a < b ? 1 : -1)).map(([m, v]) => [m, v]),
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(wsData2);
  ws2["!cols"] = [{ wch: 12 }, { wch: 18 }];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Acciones");
  XLSX.utils.book_append_sheet(wb, ws2, "Pagos Oficiales");

  const out = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  const blob = new Blob([out], { type: "application/octet-stream" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `pagos_mensuales_respaldo_${todayISO()}.xlsx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function AjustesTab({ settings, onSave, onImport, entries, officialPayments }) {
  const [pctEmpresa, setPctEmpresa] = useState((settings.pctEmpresa * 100).toString());
  const [pctRetencion, setPctRetencion] = useState((settings.pctRetencion * 100).toString());
  const [saved, setSaved] = useState(false);
  const [preview, setPreview] = useState(null); // parsed rows pending confirmation
  const [importError, setImportError] = useState(null);
  const fileRef = useRef(null);

  const save = () => {
    onSave({
      ...settings,
      pctEmpresa: Number(pctEmpresa) / 100,
      pctRetencion: Number(pctRetencion) / 100,
    });
    setSaved(true);
    setTimeout(() => setSaved(false), 1500);
  };

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImportError(null);
    setPreview(null);
    try {
      const buf = await file.arrayBuffer();
      const rows = parseWorkbook(buf);
      if (rows.length === 0) {
        setImportError("No se encontraron columnas reconocibles (Ficha, Paciente, Estado, Fecha, Monto). Revisa los encabezados de tu Excel.");
      } else {
        setPreview(rows);
      }
    } catch (err) {
      setImportError("No se pudo leer el archivo. Asegúrate de que sea un .xlsx o .csv válido.");
    }
    if (fileRef.current) fileRef.current.value = "";
  };

  const confirmImport = () => {
    onImport(preview);
    setPreview(null);
  };

  return (
    <div>
      <Section title="Respaldar datos" subtitle="Descarga todos tus registros y pagos oficiales en un Excel">
        <button
          onClick={() => exportBackup(entries, officialPayments)}

          >
            <Upload size={18} />

            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={handleFile} />

          </div>

          {importError && (

              <AlertCircle size={14} className="shrink-0 mt-0.5" /> {importError}

              <span style={{ color: C.inkSoft }} className="absolute right-3 top-1/2 -translate-y-1/2 text-sm">%</span>
            </div>
            <div style={{ color: C.inkSoft }} className="text-[11px] mt-1">Ley N°21.133: 2026 = 15,25% · sube a 17% en 2028.</div>
          </div>
          <button
            onClick={save}
            style={{ background: saved ? C.gold : C.primary, color: "#fff" }}
            className="w-full rounded-xl py-2.5 text-sm font-semibold flex items-center justify-center gap-1.5 transition-colors"
          >
            {saved ? <><Check size={16} /> Guardado</> : "Guardar cambios"}
          </button>
        </div>
      </Section>

      <Section title="Cómo funciona">
        <div style={{ background: C.primarySoft, color: C.primaryDeep }} className="rounded-xl p-3.5 text-xs leading-relaxed space-y-1.5">
          <p><b>1.</b> Monto de la acción × % empresa = Bruto boleta.</p>
          <p><b>2.</b> Bruto boleta × % retención = Retención SII.</p>
          <p><b>3.</b> Bruto boleta − Retención = Valor líquido a recibir.</p>
        </div>
      </Section>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
